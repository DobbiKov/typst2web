<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5.js Sketch Playground</title>
  <!-- p5 is NOT loaded here; it's loaded fresh inside each iframe run so its
       internal document references point to the iframe's document, not ours. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --border: #313244;
      --text: #cdd6f4;
      --muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #b4befe;
      --error: #f38ba8;
      --success: #a6e3a1;
      --editor-bg: #11111b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .toolbar-spacer { flex: 1; }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: var(--accent);
      color: var(--surface);
    }

    button:active { transform: scale(0.97); }

    /* ── Split layout ── */
    .split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-pane {
      flex: 1;
      min-width: 280px;
      border-right: 1px solid var(--border);
    }

    .preview-pane {
      flex: 1;
      min-width: 280px;
      background: #fff;
    }

    .pane-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      background: var(--editor-bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
    }

    textarea::selection { background: #45475a; }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      min-height: 26px;
      flex-shrink: 0;
    }

    .statusbar.error { color: var(--error); }
    .statusbar.ok    { color: var(--success); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Resizer ── */
    .resizer {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .resizer:hover, .resizer.dragging { background: var(--accent); }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">p5.js Playground</span>
  <span class="hint">Ctrl+Enter to run</span>
  <div class="toolbar-spacer"></div>
  <button id="run-btn">&#9654; Run</button>
</div>

<div class="split" id="split">
  <div class="pane editor-pane" id="editor-pane">
    <div class="pane-label">Code</div>
    <textarea id="editor" spellcheck="false">p.setup = function () {
  p.createCanvas(400, 400);
};

p.draw = function () {
  p.background(30);

  // bouncing circle
  const t = p.millis() / 1000;
  const x = p.width / 2 + p.cos(t) * 120;
  const y = p.height / 2 + p.sin(t * 1.3) * 100;

  p.noStroke();
  p.fill(137, 180, 250);
  p.circle(x, y, 60);

  p.fill(166, 227, 161, 180);
  p.circle(
    p.width / 2 + p.cos(t * 0.7 + 1) * 80,
    p.height / 2 + p.sin(t * 0.9 + 2) * 90,
    40
  );
};</textarea>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="pane preview-pane" id="preview-pane">
    <div class="pane-label" style="background:#f0f0f0; color:#666; border-color:#ddd;">Preview</div>
    <iframe id="preview"></iframe>
  </div>
</div>

<div class="statusbar" id="statusbar">
  <span class="status-dot"></span>
  <span id="status-text">Ready — press Run or Ctrl+Enter</span>
</div>

<script>
  const editor     = document.getElementById('editor');
  const preview    = document.getElementById('preview');
  const runBtn     = document.getElementById('run-btn');
  const statusbar  = document.getElementById('statusbar');
  const statusText = document.getElementById('status-text');

  function setStatus(kind, msg) {
    statusbar.className = 'statusbar ' + (kind === 'error' ? 'error' : kind === 'ok' ? 'ok' : '');
    statusText.textContent = msg;
  }

  function run() {
    const code = editor.value;
    setStatus('', 'Running\u2026');

    // Write into the iframe's own document so p5.js loads fresh in that context.
    // This means p5's internal `document` references point to the iframe's document,
    // not the parent's — so createCanvas() appends the canvas inside the iframe.
    // Relative <script src> resolves against the parent page's URL (file:// works).
    const doc = preview.contentDocument;
    doc.open();
    doc.write(`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #fff; }
  canvas { display: block; }
</style>
<script src="../typst_web/static/p5.min.js"><\/script>
</head>
<body>
<div id="sketch-container"></div>
<script>
(function () {
  window.onerror = function (msg, src, line, col, err) {
    parent.postMessage({ type: 'sketch-error', message: msg, line: line }, '*');
    return true;
  };
  new p5(function (p) {
    try {
${code}
    } catch (e) {
      parent.postMessage({ type: 'sketch-error', message: e.message }, '*');
    }
  }, 'sketch-container');
})();
<\/script>
</body>
</html>`);
    doc.close();

    setTimeout(() => {
      if (statusText.textContent === 'Running\u2026') setStatus('ok', 'Running');
    }, 400);
  }

  // Receive errors from iframe
  window.addEventListener('message', (ev) => {
    if (ev.data?.type === 'sketch-error') {
      const loc = ev.data.line ? ` (line ${ev.data.line})` : '';
      setStatus('error', 'Error: ' + ev.data.message + loc);
    }
  });

  // Keyboard shortcuts
  editor.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      run();
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });

  runBtn.addEventListener('click', run);

  // ── Resizer drag ──
  const resizer    = document.getElementById('resizer');
  const editorPane = document.getElementById('editor-pane');
  const split      = document.getElementById('split');
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startW = editorPane.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const totalW = split.getBoundingClientRect().width;
    const newW = Math.max(200, Math.min(totalW - 200, startW + dx));
    editorPane.style.flex = 'none';
    editorPane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // ── Init ──
  run();
</script>
</body>
</html>
